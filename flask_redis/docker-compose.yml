services:
  flask:
    build: .
    expose:
      - "5000"
    depends_on:
      - redis  
    environment: 
      - REDIS_HOST=redis
      - REDIS_PORT=6379  
  


  nginx:
    image: nginx:latest
    ports:
     - "5000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - flask
  
  
  
  redis:
    image: redis    
    volumes:
      - redis_data:/data


volumes:
  redis_data:
    